name: Deploy Dash

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/l8onx/dash

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u l8onx --password-stdin

      - name: Build and push image
        run: |
          docker build -f backend/Dockerfile \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:${{ steps.sha.outputs.short }} \
            .
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ steps.sha.outputs.short }}

      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ secrets.LXC_HOST }} << 'ENDSSH'
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u l8onx --password-stdin
          cd /opt/dash
          docker compose pull
          docker compose up -d
          for i in $(seq 1 12); do
            status=$(curl -sf http://localhost:3000/api/health 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
            if [ "$status" = "ok" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i not ready, sleeping 5s..."
            sleep 5
          done
          echo "Health check failed after 60s"
          exit 1
          ENDSSH
          rm -f ~/.ssh/deploy_key
