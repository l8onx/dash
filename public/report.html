<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dash Report</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>

  <script defer src="/vendor/alpine.min.js"></script>
  <script src="/vendor/marked.min.js"></script>
  <script src="/vendor/apexcharts.min.js"></script>
  <script src="/vendor/mermaid.min.js"></script>
  <link  rel="stylesheet" href="/vendor/dataTables.bootstrap5.min.css"/>
  <link  rel="stylesheet" href="/vendor/bootstrap.min.css"/>
  <script src="/vendor/jquery.min.js"></script>
  <script src="/vendor/jquery.dataTables.min.js"></script>
  <script src="/vendor/dataTables.bootstrap5.min.js"></script>

  <style>
    body { background-color: #0f172a; color: #e2e8f0; }

    .dataTables_wrapper { color: #e2e8f0; }
    .dataTables_wrapper .dataTables_filter input,
    .dataTables_wrapper .dataTables_length select {
      background: #1e293b; border-color: #475569; color: #e2e8f0;
      border-radius: 6px; padding: 4px 8px;
    }
    .dataTables_wrapper .dataTables_info,
    .dataTables_wrapper .dataTables_paginate { color: #94a3b8; }
    .dataTables_wrapper .dataTables_paginate .paginate_button { color: #94a3b8 !important; border-radius: 6px; }
    .dataTables_wrapper .dataTables_paginate .paginate_button.current { background: #3730a3 !important; color: #fff !important; border: none; }
    table.dataTable thead th { background: #1e293b; color: #94a3b8; border-bottom: 1px solid #334155; }
    table.dataTable tbody tr { background: #1e293b; }
    table.dataTable tbody tr:nth-child(even) { background: #172033; }
    table.dataTable tbody tr td { border-top: 1px solid #334155; color: #e2e8f0; }

    .md-content h1 { font-size: 1.75rem; font-weight: 800; margin: 1.25rem 0 0.75rem; color: #f1f5f9; }
    .md-content h2 { font-size: 1.35rem; font-weight: 700; margin: 1rem 0 0.5rem; color: #e2e8f0; }
    .md-content h3 { font-size: 1.1rem; font-weight: 600; margin: 0.85rem 0 0.4rem; color: #cbd5e1; }
    .md-content p  { margin: 0.6rem 0; line-height: 1.75; color: #cbd5e1; }
    .md-content ul, .md-content ol { padding-left: 1.5rem; margin: 0.5rem 0; color: #cbd5e1; }
    .md-content li { margin: 0.3rem 0; }
    .md-content code { background: #1e293b; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; color: #818cf8; }
    .md-content pre  { background: #1e293b; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 0.75rem 0; }
    .md-content pre code { background: none; color: #94a3b8; padding: 0; }
    .md-content blockquote { border-left: 3px solid #475569; padding-left: 1rem; color: #94a3b8; margin: 0.75rem 0; }
    .md-content a { color: #818cf8; text-decoration: underline; }
    .md-content strong { color: #f1f5f9; }
    .md-content hr { border-color: #334155; margin: 1.25rem 0; }
    .md-content table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; }
    .md-content table th { background: #1e293b; padding: 8px 12px; text-align: left; color: #94a3b8; border: 1px solid #334155; }
    .md-content table td { padding: 8px 12px; border: 1px solid #334155; color: #cbd5e1; }
    .md-content table tr:nth-child(even) td { background: #172033; }

    .mermaid svg { max-width: 100%; }
    .mermaid-diagram { cursor: pointer; position: relative; }
    .mermaid-diagram::after { content: '🔍 Click to zoom'; position: absolute; top: 8px; right: 12px; font-size: 0.7rem; color: #64748b; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .mermaid-diagram:hover::after { opacity: 1; }

    /* Mermaid zoom modal */
    #mermaid-modal { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.9); backdrop-filter: blur(6px); }
    #mermaid-modal.active { display: flex; flex-direction: column; }
    #mermaid-modal-toolbar { display: flex; justify-content: flex-end; align-items: center; gap: 8px; padding: 12px 16px; flex-shrink: 0; }
    #mermaid-modal-toolbar button { background: #1e293b; border: 1px solid #475569; color: #e2e8f0; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 0.85rem; }
    #mermaid-modal-toolbar button:hover { background: #334155; }
    #mermaid-modal-viewport { flex: 1; overflow: hidden; position: relative; cursor: grab; }
    #mermaid-modal-viewport.dragging { cursor: grabbing; }
    #mermaid-modal-content { position: absolute; top: 50%; left: 50%; transform-origin: 0 0; }
    #mermaid-modal-content svg { display: block; }
    .section-card { transition: box-shadow 0.15s; }
    .metric-up   { color: #34d399; }
    .metric-down { color: #f87171; }
    .metric-neutral { color: #94a3b8; }

    #copy-toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 9999;
      background: #1e293b; border: 1px solid #475569;
      color: #e2e8f0; padding: 0.75rem 1.25rem;
      border-radius: 10px; font-size: 0.875rem;
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
    }
    #copy-toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body class="min-h-screen font-sans">

  <div id="copy-toast">✅ URL copied!</div>

  <!-- Delete confirmation modal -->
  <div id="delete-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 backdrop-blur-sm">
    <div class="bg-slate-800 border border-slate-600 rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl">
      <h3 class="text-lg font-bold text-white mb-2">Delete report?</h3>
      <p class="text-slate-400 text-sm mb-6">This cannot be undone.</p>
      <div class="flex gap-3">
        <button onclick="hideDeleteModal()" class="flex-1 px-4 py-2 rounded-xl bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm font-semibold transition-colors">Cancel</button>
        <button onclick="confirmDelete()" class="flex-1 px-4 py-2 rounded-xl bg-red-700 hover:bg-red-600 text-white text-sm font-semibold transition-colors">Delete</button>
      </div>
    </div>
  </div>

  <div x-data="reportApp()" x-init="loadReport()">

    <!-- ── Top Bar ── -->
    <header class="sticky top-0 z-40 bg-slate-900 border-b border-slate-700 shadow-lg">
      <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
        <a href="/" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          <span>Back</span>
        </a>

        <span class="text-lg font-black text-white tracking-tight">⚡ Dash</span>

        <div class="flex items-center gap-2">
          <!-- Copy URL -->
          <button
            @click="copyUrl()"
            class="flex items-center gap-1.5 text-slate-400 hover:text-white transition-colors text-sm bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-600"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
            </svg>
            <span class="hidden sm:inline">Copy URL</span>
          </button>
          <!-- Delete -->
          <button
            x-show="report"
            @click="showDeleteModal()"
            class="flex items-center gap-1.5 text-slate-500 hover:text-red-400 transition-colors text-sm bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 hover:border-red-800"
            title="Delete report"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            <span class="hidden sm:inline">Delete</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Loading -->
    <div x-show="loading" class="flex justify-center items-center py-32">
      <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-400"></div>
    </div>
    <div x-show="error && !loading" class="max-w-4xl mx-auto px-4 py-24 text-center text-slate-400">
      <span class="text-5xl">⚠️</span>
      <p class="mt-4 text-lg" x-text="error"></p>
      <a href="/" class="mt-4 inline-block text-indigo-400 underline">← Back to feed</a>
    </div>

    <!-- Report Content -->
    <main x-show="report && !loading" class="max-w-4xl mx-auto px-4 py-8">

      <!-- Report Header -->
      <div class="mb-8 pb-6 border-b border-slate-700">
        <div class="flex items-center gap-3 mb-3">
          <span class="text-4xl" x-text="agentIcon(report?.agent)"></span>
          <span
            class="text-xs font-bold uppercase px-2 py-0.5 rounded-full"
            :style="`background: ${agentBg(report?.agent)}; color: ${agentHex(report?.agent)}`"
            x-text="report?.agent === 'wellbeing' ? 'vita' : report?.agent"
          ></span>
        </div>
        <h1 class="text-3xl font-black text-white leading-tight mb-2" x-text="report?.title"></h1>
        <p x-show="report?.subtitle" class="text-slate-400 text-lg mb-3" x-text="report?.subtitle"></p>
        <div class="flex flex-wrap items-center gap-3 text-sm text-slate-500">
          <span x-text="formatTime(report?.timestamp)"></span>
          <template x-if="report?.updatedAt">
            <span class="text-amber-400 flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
              Updated <span x-text="formatTime(report?.updatedAt)"></span>
            </span>
          </template>
          <span>·</span>
          <span class="font-mono text-xs" x-text="report?.id"></span>
        </div>
        <div class="mt-3 flex flex-wrap gap-2">
          <template x-for="tag in (report?.tags || [])" :key="tag">
            <span class="inline-block bg-slate-700 text-slate-300 text-xs font-semibold px-3 py-1 rounded-full" x-text="tag"></span>
          </template>
        </div>
      </div>

      <!-- Sections -->
      <div class="space-y-6" id="sections-container"></div>

    </main>
  </div>

  <script>
    const AGENTS = {
      fiona:     { icon: '💹', hex: '#34d399', bg: 'rgba(52,211,153,0.15)'  },
      reel:      { icon: '🎬', hex: '#a78bfa', bg: 'rgba(167,139,250,0.15)' },
      dilan:     { icon: '🚀', hex: '#38bdf8', bg: 'rgba(56,189,248,0.15)'  },
      lilani:    { icon: '🌸', hex: '#fb7185', bg: 'rgba(251,113,133,0.15)' },
      homer:     { icon: '🏠', hex: '#fbbf24', bg: 'rgba(251,191,36,0.15)'  },
      vigil:     { icon: '🛡️', hex: '#94a3b8', bg: 'rgba(148,163,184,0.15)' },
      cody:      { icon: '💻', hex: '#818cf8', bg: 'rgba(129,140,248,0.15)' },
      vita:      { icon: '🧘', hex: '#2dd4bf', bg: 'rgba(45,212,191,0.15)'  },
      wellbeing: { icon: '🧘', hex: '#2dd4bf', bg: 'rgba(45,212,191,0.15)'  },
    };
    const DEFAULT_AGENT = { icon: '🤖', hex: '#94a3b8', bg: 'rgba(148,163,184,0.15)' };

    mermaid.initialize({ startOnLoad: false, theme: 'dark', darkMode: true,
      themeVariables: { background: '#1e293b', primaryColor: '#3730a3', edgeLabelBackground: '#1e293b', tertiaryColor: '#0f172a' }
    });
    marked.setOptions({ breaks: true, gfm: true });

    // Delete modal (plain JS — outside Alpine scope)
    let _pendingDeleteId = null;
    function showDeleteModalGlobal(id) {
      _pendingDeleteId = id;
      const m = document.getElementById('delete-modal');
      m.classList.remove('hidden');
      m.classList.add('flex');
    }
    function hideDeleteModal() {
      _pendingDeleteId = null;
      const m = document.getElementById('delete-modal');
      m.classList.add('hidden');
      m.classList.remove('flex');
    }
    async function confirmDelete() {
      if (!_pendingDeleteId) return;
      const id = _pendingDeleteId;
      hideDeleteModal();
      const res = await fetch(`/api/reports/${id}`, { method: 'DELETE' });
      if (res.ok) { location.href = '/'; }
    }

    function reportApp() {
      return {
        report:  null,
        loading: true,
        error:   null,
        _loaded: false,

        agentIcon(a) { return (AGENTS[a] || DEFAULT_AGENT).icon; },
        agentHex(a)  { return (AGENTS[a] || DEFAULT_AGENT).hex;  },
        agentBg(a)   { return (AGENTS[a] || DEFAULT_AGENT).bg;   },

        formatTime(iso) {
          if (!iso) return '';
          try {
            return new Date(iso).toLocaleString(undefined, {
              weekday: 'short', year: 'numeric', month: 'short', day: 'numeric',
              hour: '2-digit', minute: '2-digit'
            });
          } catch { return iso; }
        },

        showDeleteModal() { showDeleteModalGlobal(this.report?.id); },

        async loadReport() {
          if (this._loaded) return;
          this._loaded = true;

          // Auth gate
          try {
            const av = await fetch('/api/auth/verify');
            const ad = await av.json();
            if (!ad.authenticated) { location.href = `/login?next=${encodeURIComponent(location.pathname)}`; return; }
          } catch { location.href = '/login'; return; }

          const id = window.location.pathname.split('/reports/')[1];
          if (!id) { this.error = 'No report ID in URL'; this.loading = false; return; }

          try {
            const res = await fetch(`/api/reports/${id}`);
            if (res.status === 401) { location.href = `/login?next=${encodeURIComponent(location.pathname)}`; return; }
            if (!res.ok) { this.error = `Report not found (${res.status})`; this.loading = false; return; }
            this.report = await res.json();
            document.title = `${this.report.title} — Dash`;
          } catch (e) {
            this.error = `Failed to load report: ${e.message}`;
            this.loading = false;
            return;
          }

          this.loading = false;
          await this.$nextTick();
          await this.renderSections();
        },

        async renderSections() {
          const container = document.getElementById('sections-container');
          if (!container || !this.report?.sections) return;
          container.innerHTML = '';

          for (let i = 0; i < this.report.sections.length; i++) {
            const section = this.report.sections[i];
            const card    = document.createElement('div');
            card.className = 'section-card bg-slate-800 border border-slate-700 rounded-xl p-6';

            if (section.title) {
              const h = document.createElement('h2');
              h.className  = 'text-lg font-bold text-slate-100 mb-4';
              h.textContent = section.title;
              card.appendChild(h);
            }

            const contentEl = document.createElement('div');
            card.appendChild(contentEl);
            container.appendChild(card);
            await this.renderSection(section, contentEl, i);
          }

          const diagrams = document.querySelectorAll('.mermaid-diagram');
          for (const el of diagrams) {
            try {
              await mermaid.run({ nodes: [el] });
            } catch (e) {
              console.error('Mermaid render error for', el.id, e);
              if (!el.querySelector('svg')) {
                const raw = el.textContent;
                el.innerHTML = '<pre style="color:#f87171;font-size:0.8rem;white-space:pre-wrap">Diagram render failed: ' + (e.message || e) + '</pre><pre style="color:#64748b;font-size:0.75rem;white-space:pre-wrap;margin-top:8px">' + raw + '</pre>';
              }
            }
          }
        },

        async renderSection(section, el, idx) {
          switch (section.type) {

            case 'markdown': {
              el.className = 'md-content';
              el.innerHTML = marked.parse(section.content || '');
              break;
            }

            case 'metric': {
              const m = section.content || {};
              const dirClass = m.changeDirection === 'up' ? 'metric-up'
                : m.changeDirection === 'down' ? 'metric-down' : 'metric-neutral';
              const dirIcon = m.changeDirection === 'up' ? '▲'
                : m.changeDirection === 'down' ? '▼' : '●';
              el.innerHTML = `
                <div class="flex flex-col items-start gap-1">
                  <span class="text-sm text-slate-400 font-medium">${escHtml(m.label || '')}</span>
                  <div class="flex items-end gap-3">
                    <span class="text-4xl font-black text-white">${escHtml(String(m.value || ''))}${m.unit ? `<span class="text-xl text-slate-400 font-normal ml-1">${escHtml(m.unit)}</span>` : ''}</span>
                    ${m.change !== undefined ? `<span class="${dirClass} text-lg font-bold flex items-center gap-1"><span>${dirIcon}</span><span>${escHtml(String(m.change))}</span></span>` : ''}
                  </div>
                </div>`;
              break;
            }

            case 'chart': {
              const c       = section.content || {};
              const chartId = `apex-chart-${idx}`;
              el.innerHTML  = `<div id="${chartId}"></div>`;
              const defaults = {
                theme: { mode: 'dark' },
                chart: { background: 'transparent', foreColor: '#94a3b8', toolbar: { show: true }, type: c.chartType || 'line', height: 300, ...(c.data?.chart || {}) },
                grid:    { borderColor: '#334155', ...(c.data?.grid    || {}) },
                tooltip: { theme: 'dark',           ...(c.data?.tooltip || {}) },
                ...c.data,
                chart: { background: 'transparent', foreColor: '#94a3b8', type: c.chartType || 'line', height: 300, ...(c.data?.chart || {}) }
              };
              try {
                const apex = new ApexCharts(document.getElementById(chartId), defaults);
                await apex.render();
              } catch (e) {
                el.innerHTML = `<p class="text-red-400 text-sm">Chart render error: ${escHtml(e.message)}</p>`;
              }
              break;
            }

            case 'table': {
              const t       = section.content || {};
              const tableId = `dt-${idx}`;
              const headers = (t.columns || []).map(c => `<th>${escHtml(String(c))}</th>`).join('');
              const rows    = (t.rows    || []).map(row =>
                `<tr>${row.map(cell => `<td>${cellHtml(String(cell))}</td>`).join('')}</tr>`
              ).join('');
              el.innerHTML = `
                <div class="overflow-x-auto">
                  <table id="${tableId}" class="display w-full" style="width:100%">
                    <thead><tr>${headers}</tr></thead>
                    <tbody>${rows}</tbody>
                  </table>
                </div>`;
              try {
                $(`#${tableId}`).DataTable({ destroy: true, pageLength: 10, responsive: true,
                  language: { search: 'Filter:', lengthMenu: 'Show _MENU_' }
                });
              } catch(e) { console.warn('DataTable init failed:', e); }
              break;
            }

            case 'mermaid': {
              const diagramId = `mermaid-${idx}`;
              el.innerHTML = `<div class="mermaid-diagram overflow-x-auto p-2 bg-slate-900 rounded-lg" id="${diagramId}">${section.content || ''}</div>`;
              break;
            }

            // Raw HTML — only trusted authenticated agents can POST reports
            case 'html': {
              el.innerHTML = section.content || '';
              break;
            }

            default: {
              el.innerHTML = `<pre class="text-slate-400 text-xs overflow-auto bg-slate-900 p-4 rounded-lg">${escHtml(JSON.stringify(section.content, null, 2))}</pre>`;
            }
          }
        },

        copyUrl() {
          navigator.clipboard.writeText(window.location.href).then(() => {
            const toast = document.getElementById('copy-toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
          });
        }
      };
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function cellHtml(str) {
      const urlPattern = /https?:\/\/[^\s<>"]+/g;
      const trimmed = str.trim();
      if (/^https?:\/\/[^\s<>"]+$/.test(trimmed)) {
        return `<a href="${escHtml(trimmed)}" target="_blank" rel="noopener noreferrer" class="text-indigo-400 underline hover:text-indigo-300 break-all">🔗 Link</a>`;
      }
      if (urlPattern.test(trimmed)) {
        return escHtml(str).replace(/https?:\/\/[^\s&<>"]+/g, url => {
          const raw = url.replace(/&amp;/g,'&').replace(/&quot;/g,'"');
          return `<a href="${escHtml(raw)}" target="_blank" rel="noopener noreferrer" class="text-indigo-400 underline hover:text-indigo-300">${url}</a>`;
        });
      }
      return escHtml(str);
    }
  </script>
<!-- Mermaid zoom modal -->
<div id="mermaid-modal">
  <div id="mermaid-modal-toolbar">
    <button id="mermaid-zoom-out">-</button>
    <button id="mermaid-zoom-reset">100%</button>
    <button id="mermaid-zoom-in">+</button>
    <button id="mermaid-modal-close">✕ Close</button>
  </div>
  <div id="mermaid-modal-viewport">
    <div id="mermaid-modal-content"></div>
  </div>
</div>
<script>
(function() {
  const modal = document.getElementById('mermaid-modal');
  const viewport = document.getElementById('mermaid-modal-viewport');
  const content = document.getElementById('mermaid-modal-content');
  const closeBtn = document.getElementById('mermaid-modal-close');
  const zoomIn = document.getElementById('mermaid-zoom-in');
  const zoomOut = document.getElementById('mermaid-zoom-out');
  const zoomReset = document.getElementById('mermaid-zoom-reset');
  let scale = 1;
  let panX = 0;
  let panY = 0;
  let drag = null;

  function applyTransform() {
    content.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    zoomReset.textContent = `${Math.round(scale * 100)}%`;
  }

  function fitDiagram() {
    const svg = content.querySelector('svg');
    if (!svg) return;
    const vb = svg.viewBox && svg.viewBox.baseVal;
    const width = vb && vb.width ? vb.width : (svg.getBoundingClientRect().width || 1200);
    const height = vb && vb.height ? vb.height : (svg.getBoundingClientRect().height || 800);
    const vw = viewport.clientWidth;
    const vh = viewport.clientHeight;
    const fit = Math.min((vw * 0.92) / width, (vh * 0.92) / height);
    scale = Math.max(0.35, Math.min(fit, 2.5));
    panX = (vw - width * scale) / 2;
    panY = (vh - height * scale) / 2;
    applyTransform();
  }

  function openDiagram(svg) {
    content.innerHTML = svg.outerHTML;
    modal.classList.add('active');
    scale = 1;
    panX = 0;
    panY = 0;
    requestAnimationFrame(() => { fitDiagram(); });
  }

  document.addEventListener('click', function(e) {
    const diagram = e.target.closest('.mermaid-diagram');
    if (!diagram) return;
    const svg = diagram.querySelector('svg');
    if (!svg) return;
    openDiagram(svg);
  });

  zoomIn.addEventListener('click', function(e) { e.stopPropagation(); scale = Math.min(scale * 1.2, 8); applyTransform(); });
  zoomOut.addEventListener('click', function(e) { e.stopPropagation(); scale = Math.max(scale / 1.2, 0.1); applyTransform(); });
  zoomReset.addEventListener('click', function(e) { e.stopPropagation(); fitDiagram(); });
  closeBtn.addEventListener('click', function() { modal.classList.remove('active'); });
  modal.addEventListener('click', function(e) { if (e.target === modal) modal.classList.remove('active'); });
  viewport.addEventListener('wheel', function(e) {
    e.preventDefault();
    const delta = e.deltaY < 0 ? 1.1 : 0.9;
    scale = Math.max(0.1, Math.min(scale * delta, 8));
    applyTransform();
  }, { passive: false });
  viewport.addEventListener('mousedown', function(e) {
    drag = { x: e.clientX, y: e.clientY, panX, panY };
    viewport.classList.add('dragging');
  });
  window.addEventListener('mousemove', function(e) {
    if (!drag) return;
    panX = drag.panX + (e.clientX - drag.x);
    panY = drag.panY + (e.clientY - drag.y);
    applyTransform();
  });
  window.addEventListener('mouseup', function() {
    drag = null;
    viewport.classList.remove('dragging');
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') modal.classList.remove('active');
    if (!modal.classList.contains('active')) return;
    if (e.key === '+' || e.key === '=') { scale = Math.min(scale * 1.1, 8); applyTransform(); }
    if (e.key === '-') { scale = Math.max(scale / 1.1, 0.1); applyTransform(); }
    if (e.key === '0') fitDiagram();
  });
})();
</script>
</body>
</html>
