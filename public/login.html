<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dash — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>body { background-color: #0f172a; }</style>
</head>
<body class="min-h-screen flex items-center justify-center text-slate-100 font-sans">
  <div class="w-full max-w-sm px-6">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">⚡</div>
      <h1 class="text-3xl font-black tracking-tight text-white">Dash</h1>
      <p class="text-slate-400 text-sm mt-1">OpenClaw Report Portal</p>
    </div>

    <form id="login-form" class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-2xl space-y-4">
      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-1.5">Access Key</label>
        <input
          id="psk-input"
          type="password"
          placeholder="Enter access key…"
          autocomplete="current-password"
          class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-slate-100 placeholder-slate-600 focus:outline-none focus:border-indigo-500 text-sm"
        />
      </div>

      <div id="error-msg" class="hidden text-red-400 text-sm text-center bg-red-900/20 border border-red-800 rounded-lg py-2 px-3">
        Invalid access key. Try again.
      </div>

      <button
        type="submit"
        id="submit-btn"
        class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-colors text-sm"
      >
        Sign In
      </button>
    </form>

    <p class="text-center text-slate-600 text-xs mt-6">Access key valid for 365 days</p>
  </div>

  <script>
    // If already authed, redirect immediately
    fetch('/api/auth/verify')
      .then(r => r.json())
      .then(d => {
        if (d.authenticated) {
          const next = new URLSearchParams(location.search).get('next') || '/';
          location.href = next;
        }
      })
      .catch(() => {});

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const psk    = document.getElementById('psk-input').value.trim();
      const btn    = document.getElementById('submit-btn');
      const errMsg = document.getElementById('error-msg');
      if (!psk) return;

      btn.disabled    = true;
      btn.textContent = 'Signing in…';
      errMsg.classList.add('hidden');

      try {
        const res  = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ psk }),
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          const next = new URLSearchParams(location.search).get('next') || '/';
          location.href = next;
        } else {
          errMsg.classList.remove('hidden');
          btn.disabled    = false;
          btn.textContent = 'Sign In';
        }
      } catch {
        errMsg.classList.remove('hidden');
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
